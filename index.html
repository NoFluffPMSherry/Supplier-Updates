<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image and Documents from Supplier and Repairer Side — Concepts</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',Inter,Arial,sans-serif;background:#F0F2F5;color:#0F1923;display:flex;flex-direction:column}

.toggle-bar{background:#0F1923;padding:10px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.toggle-bar .title{color:rgba(255,255,255,.5);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-right:auto}
.toggle{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:8px;padding:3px}
.toggle button{border:none;background:transparent;color:rgba(255,255,255,.55);font-family:inherit;font-size:12px;font-weight:700;padding:7px 16px;border-radius:6px;cursor:pointer}
.toggle button.on{background:#18A058;color:#fff}
.toggle button:hover:not(.on){color:#fff}
.link-out{color:rgba(255,255,255,.4);font-size:11px;text-decoration:none}
.link-out:hover{color:#fff}

.frame-wrap{flex:1;position:relative}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff}
iframe.hidden{display:none}
</style>
</head>
<body>
<div class="toggle-bar">
  <span class="title">Image &amp; Documents — Supplier / Repairer Side</span>
  <div class="toggle">
    <button id="btn-supplier" class="on" onclick="showView('supplier')">Supplier View</button>
    <button id="btn-repairer" onclick="showView('repairer')">Repairer View</button>
  </div>
  <a class="link-out" href="design-brief.md">Design brief →</a>
</div>
<div class="frame-wrap">
  <iframe id="frame-supplier" src="Mockups/supplier-upload-mockup.html"></iframe>
  <iframe id="frame-repairer" class="hidden" src="Mockups/repairer-image-display-mockup.html"></iframe>
</div>
<script>
function showView(view){
  document.getElementById('frame-supplier').classList.toggle('hidden', view !== 'supplier');
  document.getElementById('frame-repairer').classList.toggle('hidden', view !== 'repairer');
  document.getElementById('btn-supplier').classList.toggle('on', view === 'supplier');
  document.getElementById('btn-repairer').classList.toggle('on', view === 'repairer');
}
</script>
</body>
</html>
